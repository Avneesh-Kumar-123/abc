kind = "web"
previewPath = "/"
title = "Cat Chase: Mouse Hunt"
version = "1.0.0"
id = "artifacts/cat-chase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19085

[services.development]
run = "pnpm --filter @workspace/cat-chase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cat-chase", "run", "build" ]
publicDir = "artifacts/cat-chase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19085"
BASE_PATH = "/"
